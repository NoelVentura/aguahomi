<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedido registrado</title>
</head>
<body>
  <p>Pedido registrado correctamente. Esta ventana se cerrar&aacute;.</p>
  <script>
    (function() {
      if (window.opener) {
        window.opener.postMessage('aguahomi_ok', '*');
        window.close();
      }
      if (window.parent !== window) {
        window.parent.postMessage('aguahomi_ok', '*');
      }
    })();
  </script>
</body>
</html>
